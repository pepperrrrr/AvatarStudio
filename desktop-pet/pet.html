<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Claude Code 桌宠</title>
<style>
  html, body { margin: 0; background: transparent; overflow: hidden; user-select: none; }
  #stage {
    position: relative;
    width: 230px;
    height: 260px;
    -webkit-app-region: drag; /* 整体可拖拽移动 */
  }
  #petWrap {
    position: absolute;
    left: 15px;
    top: 62px;
    width: 200px;
    height: 200px;
    animation: bob 3.2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }
  #petSvg { width: 100%; height: 100%; transition: transform .15s linear; }
  #shadow {
    position: absolute;
    left: 55px;
    bottom: 4px;
    width: 120px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(0,0,0,.32), transparent 70%);
    animation: shadowPulse 3.2s ease-in-out infinite;
  }
  @keyframes shadowPulse {
    0%, 100% { transform: scaleX(1); opacity: .9; }
    50% { transform: scaleX(.86); opacity: .6; }
  }
  /* 脸部点击热区：不参与拖拽，负责互动 */
  #faceHit {
    position: absolute;
    left: 75px;
    top: 122px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    -webkit-app-region: no-drag;
    cursor: pointer;
  }
  #close {
    position: absolute;
    right: 2px;
    top: 40px;
    width: 22px;
    height: 22px;
    border: none;
    border-radius: 50%;
    background: rgba(30, 30, 36, .85);
    color: #ddd;
    font-size: 11px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity .2s;
    -webkit-app-region: no-drag;
    padding: 0;
  }
  #stage:hover #close { opacity: 1; }
  .bubble {
    position: absolute;
    top: 2px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 210px;
    background: #1f2430;
    color: #e8ecf4;
    border: 1px solid #343c4e;
    border-radius: 10px;
    padding: 6px 10px;
    font: 11px/1.5 "SF Mono", Menlo, monospace;
    white-space: nowrap;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
  }
  .bubble::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 50%;
    margin-left: -6px;
    border: 6px solid transparent;
    border-top-color: #1f2430;
    border-bottom: none;
  }
  .bubble.show { opacity: 1; }
  .bubble .prompt { color: #d97757; font-weight: 700; }
  .fx {
    position: absolute;
    font-size: 15px;
    pointer-events: none;
    animation: rise .9s ease-out forwards;
  }
  @keyframes rise {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to { opacity: 0; transform: translateY(-46px) scale(1.5); }
  }
  .lid { transform-box: fill-box; transform-origin: center; }
</style>
</head>
<body>
<div id="stage">
  <div id="bubble" class="bubble"></div>
  <div id="shadow"></div>
  <div id="petWrap">
    <svg id="petSvg" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="bodyGrad" cx="0.5" cy="0.42" r="0.75">
          <stop offset="0%" stop-color="#e78d64" />
          <stop offset="100%" stop-color="#d97757" />
        </radialGradient>
        <path id="petal" d="M -13 -20 C -17 -45 -10 -68 0 -76 C 10 -68 17 -45 13 -20 C 8 -14 -8 -14 -13 -20 Z" />
      </defs>
      <g id="body">
        <g id="petals" fill="url(#bodyGrad)"></g>
        <circle r="36" fill="url(#bodyGrad)" />
        <!-- 脸 -->
        <g id="face" transform="translate(0 20)">
          <ellipse cx="-17" cy="8" rx="8" ry="4.5" fill="#c05a3e" opacity="0.55" />
          <ellipse cx="17" cy="8" rx="8" ry="4.5" fill="#c05a3e" opacity="0.55" />
          <g id="eyeL" transform="translate(-13 -4)">
            <g class="lid">
              <ellipse rx="6.5" ry="9" fill="#40241a" />
              <circle cx="-2" cy="-3.5" r="2.4" fill="#fff" />
              <circle cx="2.6" cy="2.5" r="1.2" fill="#fff" opacity="0.85" />
            </g>
          </g>
          <g id="eyeR" transform="translate(13 -4)">
            <g class="lid">
              <ellipse rx="6.5" ry="9" fill="#40241a" />
              <circle cx="-2" cy="-3.5" r="2.4" fill="#fff" />
              <circle cx="2.6" cy="2.5" r="1.2" fill="#fff" opacity="0.85" />
            </g>
          </g>
          <g id="mouths">
            <path id="m-normal" d="M -5 9 Q 0 13 5 9" stroke="#40241a" stroke-width="2" fill="none" stroke-linecap="round" />
            <path id="m-happy" d="M -7 8 Q 0 17 7 8 Z" fill="#40241a" visibility="hidden" />
            <ellipse id="m-wow" cx="0" cy="11" rx="4" ry="5" fill="#40241a" visibility="hidden" />
            <path id="m-sleepy" d="M -5 11 L 5 11" stroke="#40241a" stroke-width="2" fill="none" stroke-linecap="round" visibility="hidden" />
          </g>
          <text id="zzz" x="30" y="-18" font-size="13" fill="#8f5b46" visibility="hidden">z Z</text>
        </g>
      </g>
    </svg>
  </div>
  <div id="faceHit" title="点我一下"></div>
  <button id="close" title="退出桌宠">✕</button>
</div>
<script>
  // 生成八瓣星芒身体（Anthropic 星芒风格）
  const petals = document.getElementById('petals')
  for (let i = 0; i < 8; i++) {
    const u = document.createElementNS('http://www.w3.org/2000/svg', 'use')
    u.setAttribute('href', '#petal')
    u.setAttribute('transform', `rotate(${i * 45})`)
    petals.appendChild(u)
  }

  const svg = document.getElementById('petSvg')
  const lids = document.querySelectorAll('.lid')
  const eyeL = document.getElementById('eyeL')
  const eyeR = document.getElementById('eyeR')
  const bubble = document.getElementById('bubble')
  const zzz = document.getElementById('zzz')

  // —— 视线追踪：主进程喂全局光标位置 ——
  let tx = 0, ty = 0, gx = 0, gy = 0
  if (window.pet) {
    window.pet.onCursor(({ dx, dy }) => {
      tx = Math.max(-1, Math.min(1, dx / 300))
      ty = Math.max(-1, Math.min(1, dy / 300))
    })
  }

  // —— 眨眼 ——
  let blink = 0, blinkStart = -1e9, nextBlink = 1500
  // —— 心情 ——
  const MOODS = ['normal', 'happy', 'wow', 'sleepy']
  let mood = 0

  function loop(now) {
    requestAnimationFrame(loop)
    gx += (tx - gx) * 0.12
    gy += (ty - gy) * 0.12
    if (now >= nextBlink) { blinkStart = now; nextBlink = now + 2200 + Math.random() * 3300 }
    const ph = (now - blinkStart) / 130
    blink = ph >= 0 && ph <= 1 ? Math.sin(Math.PI * ph) : 0
    const sleepy = MOODS[mood] === 'sleepy'
    const openY = sleepy ? 0.22 : Math.max(0.06, 1 - blink)
    lids.forEach((l) => { l.style.transform = `scale(1, ${openY})` })
    const ex = gx * 4, ey = gy * 3
    eyeL.setAttribute('transform', `translate(${-13 + ex} ${-4 + ey})`)
    eyeR.setAttribute('transform', `translate(${13 + ex} ${-4 + ey})`)
    svg.style.transform = `rotate(${gx * 5}deg)`
  }
  requestAnimationFrame(loop)

  function setMood(i) {
    mood = i % MOODS.length
    const id = MOODS[mood]
    for (const m of ['normal', 'happy', 'wow', 'sleepy']) {
      document.getElementById('m-' + m).setAttribute('visibility', m === id ? 'visible' : 'hidden')
    }
    zzz.setAttribute('visibility', id === 'sleepy' ? 'visible' : 'hidden')
  }

  // —— 点击互动：换心情 + 冒爱心 ——
  document.getElementById('faceHit').addEventListener('click', (e) => {
    setMood(mood + 1)
    const fx = document.createElement('span')
    fx.className = 'fx'
    fx.textContent = Math.random() < 0.5 ? '♥' : '✦'
    fx.style.left = 95 + (Math.random() * 40 - 20) + 'px'
    fx.style.top = '110px'
    fx.style.color = Math.random() < 0.5 ? '#ff6b8a' : '#d97757'
    document.getElementById('stage').appendChild(fx)
    setTimeout(() => fx.remove(), 950)
    say(mood === 1 ? '嘿嘿 (＾▽＾)' : mood === 2 ? '哇哦！' : mood === 3 ? '休息一下… z Z' : '继续干活！')
  })

  document.getElementById('close').addEventListener('click', () => window.pet && window.pet.quit())

  // —— 终端风气泡 ——
  const LINES = [
    '<span class="prompt">❯</span> 正在思考…',
    '<span class="prompt">❯</span> npm run dev <span style="color:#63d471">✓</span>',
    '<span class="prompt">❯</span> 修好了一个 bug',
    '<span class="prompt">❯</span> git push origin main',
    '<span class="prompt">❯</span> 编译通过 · 0 errors',
    'vibe coding 中…',
    '有新需求吗？',
    '记得喝水休息哦 ☕',
    '今天也要加油呀 ✦',
  ]
  let bubbleTimer = 0
  function say(html) {
    bubble.innerHTML = html
    bubble.classList.add('show')
    clearTimeout(bubbleTimer)
    bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 4200)
  }
  function chatter() {
    say(LINES[Math.floor(Math.random() * LINES.length)])
    setTimeout(chatter, 18000 + Math.random() * 17000)
  }
  setTimeout(() => say('<span class="prompt">❯</span> 你好，我是小 Claude ✦'), 1200)
  setTimeout(chatter, 12000)
</script>
</body>
</html>
