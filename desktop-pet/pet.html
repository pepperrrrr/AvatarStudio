<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Claude Code 桌宠</title>
<style>
  html, body { margin: 0; background: transparent; overflow: hidden; user-select: none; }
  #stage {
    position: relative;
    width: 340px;
    height: 300px;
    pointer-events: none; /* 透明区域完全穿透，不挡桌面操作 */
  }
  #ball, .sideBtn, #genBar, #genBar * { pointer-events: auto; }
  /* 命中判定精确到画出来的图形：容器不接管鼠标，只有 SVG 实际形状接管 */
  #petWrap, #petSvg { pointer-events: none; }
  #petSvg * { pointer-events: visiblePainted; }
  /* 舞台底部一条不可见地面，桌宠和足球都踩在 floorY 上 */
  #petWrap {
    position: absolute;
    left: 70px;   /* home 位置，JS 用 translateX 让它左右走动 */
    top: 60px;
    width: 200px;
    height: 200px;
    cursor: grab;
    will-change: transform;
  }
  #petSvg { width: 100%; height: 100%; overflow: visible; }
  #shadow {
    position: absolute;
    top: 236px;   /* 贴着 floorY，JS 跟着桌宠横移 */
    left: 110px;
    width: 120px;
    height: 16px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(0,0,0,.32), transparent 70%);
    will-change: transform;
  }
  #ball {
    position: absolute;
    top: 0; left: 0;
    width: 30px;
    height: 30px;
    display: none;
    -webkit-app-region: no-drag;
    cursor: pointer;
    will-change: transform;
    z-index: 4;
  }
  #ball.on { display: block; }
  .sideBtn {
    position: absolute;
    right: 2px;
    width: 22px;
    height: 22px;
    border: none;
    border-radius: 50%;
    background: rgba(30, 30, 36, .85);
    color: #ddd;
    font-size: 11px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity .2s;
    -webkit-app-region: no-drag;
    padding: 0;
  }
  #stage.ui-on .sideBtn { opacity: 1; }
  #close { top: 42px; }
  #gen { top: 70px; }
  #reset { top: 98px; }
  .bubble {
    position: absolute;
    top: 2px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 214px;
    background: #1f2430;
    color: #e8ecf4;
    border: 1px solid #343c4e;
    border-radius: 10px;
    padding: 6px 10px;
    font: 11px/1.5 "SF Mono", Menlo, monospace;
    white-space: normal;
    text-align: center;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
  }
  .bubble::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 50%;
    margin-left: -6px;
    border: 6px solid transparent;
    border-top-color: #1f2430;
    border-bottom: none;
  }
  .bubble.show { opacity: 1; }
  .bubble .prompt { color: #d97757; font-weight: 700; }
  #genBar {
    position: absolute;
    left: 8px;
    right: 8px;
    bottom: 4px;
    display: none;
    gap: 6px;
    -webkit-app-region: no-drag;
  }
  #genBar.open { display: flex; }
  #genInput {
    flex: 1;
    min-width: 0;
    background: #1f2430;
    border: 1px solid #343c4e;
    border-radius: 8px;
    color: #e8ecf4;
    font: 11px/1.4 "PingFang SC", sans-serif;
    padding: 6px 8px;
    outline: none;
  }
  #genInput:focus { border-color: #d97757; }
  #genGo {
    border: none;
    border-radius: 8px;
    background: #d97757;
    color: #fff;
    font-size: 12px;
    padding: 0 10px;
    cursor: pointer;
  }
  #genGo:disabled { opacity: .5; }
  .fx {
    position: absolute;
    font-size: 15px;
    pointer-events: none;
    animation: rise .9s ease-out forwards;
  }
  @keyframes rise {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to { opacity: 0; transform: translateY(-46px) scale(1.5); }
  }
  .lid { transform-box: fill-box; transform-origin: center; }
</style>
</head>
<body>
<div id="stage">
  <div id="bubble" class="bubble"></div>
  <div id="shadow"></div>
  <div id="petWrap" title="点我互动 · 我会自己走动和踢球">
    <svg id="petSvg" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <svg id="ball" viewBox="0 0 30 30" title="点我踢球">
    <circle cx="15" cy="15" r="14" fill="#fff" stroke="#2e2a33" stroke-width="1.5"/>
    <path d="M15 6 L20 10 L18 16 L12 16 L10 10 Z" fill="#2e2a33"/>
    <path d="M15 6 L15 2 M20 10 L25 8 M18 16 L21 21 M12 16 L9 21 M10 10 L5 8" stroke="#2e2a33" stroke-width="1.2"/>
  </svg>
  <button id="close" class="sideBtn" title="退出桌宠">✕</button>
  <button id="gen" class="sideBtn" title="用一句话生成新桌宠">✎</button>
  <button id="reset" class="sideBtn" title="换回小 Claude">↺</button>
  <button id="live2d" class="sideBtn" style="top: 126px" title="切换 Live2D 真皮套">🎭</button>
  <div id="genBar">
    <input id="genInput" placeholder="如：戴帽子的蓝色小猫…回车生成" />
    <button id="genGo">➤</button>
  </div>
</div>
<script>
  // ============ 动漫角色 v2（DNA 规范）：7.2 头身 · 倒梯形脸 · 年轮水波纹眼 · 深雾棕长发
  //   炭灰 oversize 卫衣+白内搭 · 工装百褶裙 · 不对称袜 · 厚底鞋 · 立方体饰品 · 5 色规范 · 渐变立体光影
  function buildAnimeGirl(pose) {
    const sit = pose === 'sit'
    // 5 色规范 + 必要肤/发色
    const CHAR = '#3F4248', CHARL = '#4c5057', CHARD = '#33363c' // 炭灰卫衣
    const MIST = '#6A6F7A', MISTD = '#565b64'                     // 雾灰（裙/袜）
    const LAKE = '#89C9D8', GPUR = '#9E8AC8', CREAM = '#F3F0EA'
    const SKIN = '#f2d3c0', SKSH = '#e2b6a1', SKLN = '#cf9c89'
    const HR = '#5f4c40', HRLI = '#82695a', HRDK = '#41332b'    // 深雾棕
    const SIL = '#c9cdd4', SILL = '#e8ebf0', SILD = '#a7acb6'   // 银色立方体

    // 立方体（等距，3D 感）
    const cube = (x, y, s, c, cl, cd) => `<g>
      <polygon points="${x},${(y - s).toFixed(1)} ${(x + s * 0.87).toFixed(1)},${(y - s * 0.5).toFixed(1)} ${x},${y} ${(x - s * 0.87).toFixed(1)},${(y - s * 0.5).toFixed(1)}" fill="${cl}"/>
      <polygon points="${(x - s * 0.87).toFixed(1)},${(y - s * 0.5).toFixed(1)} ${x},${y} ${x},${(y + s).toFixed(1)} ${(x - s * 0.87).toFixed(1)},${(y + s * 0.5).toFixed(1)}" fill="${c}"/>
      <polygon points="${(x + s * 0.87).toFixed(1)},${(y - s * 0.5).toFixed(1)} ${x},${y} ${x},${(y + s).toFixed(1)} ${(x + s * 0.87).toFixed(1)},${(y + s * 0.5).toFixed(1)}" fill="${cd}"/></g>`
    const hollowCube = (x, y, s, col) => `<g fill="none" stroke="${col}" stroke-width="1.1">
      <polygon points="${x - s},${y - s} ${x + s * 0.5},${y - s * 1.4} ${x + s * 1.6},${y - s * 0.6} ${x + s * 0.1},${y - s * 0.2}"/>
      <path d="M ${x - s} ${y - s} L ${x - s} ${y + s * 0.5} M ${x + s * 1.6} ${y - s * 0.6} L ${x + s * 1.6} ${y + s} M ${x + s * 0.1} ${y - s * 0.2} L ${x + s * 0.1} ${y + s * 1.1}"/>
      <polygon points="${x - s},${y + s * 0.5} ${x + s * 0.5},${y + s * 0.1} ${x + s * 1.6},${y + s} ${x + s * 0.1},${y + s * 1.1}"/></g>`

    // 招牌眼（小而干净，符合 7.2 头身比例）：石墨灰→湖蓝灰→雾青绿→黑瞳；年轮+水波纹；单主高光+单环境高光
    const eyeContent =
      `<ellipse cx="0" cy="0" rx="5.2" ry="6.6" fill="#f6f4ef"/>` +
      `<circle cx="0" cy="0.4" r="4.5" fill="url(#gIris)"/>` +
      `<circle cx="0" cy="0.4" r="3.1" fill="none" stroke="#33404a" stroke-width="0.4" opacity="0.55"/>` +
      `<path d="M -3.6 1.6 Q 0 0.1 3.6 1.6" fill="none" stroke="#a9cfc6" stroke-width="0.45" opacity="0.55"/>` +
      `<circle cx="0" cy="0.4" r="1.9" fill="#0a0a0e"/>` +
      `<ellipse cx="-1.5" cy="-1.7" rx="1.4" ry="1.8" fill="#ffffff"/>` +
      `<circle cx="1.6" cy="2" r="0.7" fill="#dcefe9" opacity="0.6"/>` +
      `<path d="M -5 -4.2 Q 0 -6.4 5 -4.2" stroke="#2a2530" stroke-width="1.1" fill="none" stroke-linecap="round"/>` +
      `<path d="M -3.8 3.4 Q 0 4.4 3.8 3.4" stroke="#9a8579" stroke-width="0.5" fill="none" opacity="0.5"/>`
    const eye = (id, cx) => `<g id="${id}" transform="translate(${cx} -94)"><g class="lid">${eyeContent}</g></g>`

    // —— 腿 + 不对称袜 + 未来感厚底运动鞋（站/坐）——
    // 鞋：奶白鞋面 + 网面线 + 深色中底 + 湖蓝厚大底 + 鞋头护片
    const shoe = (x) => `<g transform="translate(${x} 0)">
        <path d="M -7.5 88 Q -8.5 96 -6 98 L 7 98 Q 9.5 97 9 92 Q 8.5 87.5 4 87.5 L -4.5 87.5 Q -7.2 87.5 -7.5 88 Z" fill="${CREAM}" stroke="#cfcabd" stroke-width="0.7"/>
        <path d="M 4 87.5 Q 8.5 88 9 92 Q 9.3 95 7.5 96 Q 3 95 3 90 Z" fill="#e3dfd3"/>
        <line x1="-4.5" y1="90" x2="1.5" y2="90" stroke="${MIST}" stroke-width="0.7"/>
        <line x1="-4.5" y1="92.5" x2="1.5" y2="92.5" stroke="${MIST}" stroke-width="0.7"/>
        <path d="M -8.5 97 Q -9.5 101 -5 102 L 8 102 Q 11 101 10 97.5 Q 2 100 -8.5 97 Z" fill="${CHAR}"/>
        <path d="M -9.5 101 L 10.8 101 Q 11.5 103.5 9 104.5 L -7 104.5 Q -10 104 -9.5 101 Z" fill="${LAKE}"/>
        <line x1="-6" y1="102.6" x2="8" y2="102.6" stroke="#fff" stroke-width="0.5" opacity="0.5"/></g>`
    const legStand = `
        <path d="M -10.5 4 Q -12 55 -9.5 90 L -3 90 Q -2 48 -3 4 Z" fill="${SKIN}"/>
        <path d="M 10.5 4 Q 12 55 9.5 90 L 3 90 Q 2 48 3 4 Z" fill="${SKIN}"/>
        <path d="M -11.4 38 Q -12 62 -9.6 89 L -3 89 Q -2.2 62 -2.7 38 Z" fill="${MIST}" stroke="${MISTD}" stroke-width="0.8"/>
        <rect x="-11.4" y="38" width="8.7" height="2" fill="${LAKE}"/>
        <rect x="-11.2" y="41.4" width="8.3" height="1" fill="${LAKE}" opacity="0.6"/>
        <path d="M 11.4 62 Q 11.8 74 9.6 89 L 3 89 Q 2.3 74 2.7 62 Z" fill="${MIST}" stroke="${MISTD}" stroke-width="0.8"/>
        <rect x="2.7" y="62" width="8.7" height="2" fill="${LAKE}"/>
        ${shoe(-6.8)}${shoe(6.8)}`
    // 坐姿：小腿前伸，鞋侧视
    const sitShoe = (x, flip) => `<g transform="translate(${x} 0) scale(${flip} 1)">
        <path d="M -9 52 Q -10 58 -7 59.5 L 8 59.5 Q 10 58 9 54.5 Q 6 51.5 1 51.5 L -6 51.5 Q -8.6 51.5 -9 52 Z" fill="${CREAM}" stroke="#cfcabd" stroke-width="0.7"/>
        <path d="M -10 58.5 Q -10.5 62 -6 62.8 L 9 62.8 Q 11.5 62 10.5 59 Q 1 61.5 -10 58.5 Z" fill="${CHAR}"/>
        <path d="M -10.5 62 L 11 62 Q 11.5 64.5 9 65.2 L -8 65.2 Q -11 64.6 -10.5 62 Z" fill="${LAKE}"/></g>`
    const legSit = `
        <path d="M -11 6 Q -25 28 -29 48 Q -29 56 -20 56 L -9 54 Q -5 30 -3 8 Z" fill="${SKIN}"/>
        <path d="M 11 6 Q 25 28 29 48 Q 29 56 20 56 L 9 54 Q 5 30 3 8 Z" fill="${SKIN}"/>
        <path d="M -21 30 Q -29 44 -27 54 L -17 54 Q -12 40 -12 30 Z" fill="${MIST}" stroke="${MISTD}" stroke-width="0.8"/>
        <rect x="-21" y="30" width="9" height="1.8" fill="${LAKE}" transform="rotate(-14 -21 30)"/>
        <path d="M 19 40 Q 28 48 27 54 L 17 54 Q 13 47 13 40 Z" fill="${MIST}" stroke="${MISTD}" stroke-width="0.8"/>
        ${sitShoe(-20, -1)}${sitShoe(20, 1)}`
    const legs = sit ? legSit : legStand

    // 工装百褶短裙：腰头 + 箱褶(锯齿下摆) + 右侧带盖工装口袋
    const skirt = `<path d="M -25 -6 Q 0 -1 25 -6
        L 30 20 L 24 22.5 L 18 20.5 L 12 23 L 6 20.8 L 0 23.2 L -6 20.8 L -12 23 L -18 20.5 L -24 22.5 L -30 20 Z"
        fill="url(#gSkirt)" stroke="${MISTD}" stroke-width="1"/>` +
      [-18, -6, 6, 18].map(x => `<path d="M ${x} -3.5 L ${(x * 1.55).toFixed(1)} 22" stroke="${MISTD}" stroke-width="0.8" opacity="0.55" fill="none"/>`).join('') +
      `<path d="M -25 -6 Q 0 -1 25 -6 L 25.6 -2 Q 0 3 -25.6 -2 Z" fill="${CHARD}" opacity="0.85"/>
       <g><rect x="13" y="4" width="10" height="11" rx="1.8" fill="${MIST}" stroke="${MISTD}" stroke-width="0.9"/>
       <path d="M 13 4 L 23 4 L 23 8 L 13 8 Z" fill="${MISTD}"/>
       <rect x="17" y="6" width="2" height="1.6" fill="${LAKE}"/></g>`

    // 白色内搭（露在卫衣下摆下沿一条）
    const inner = `<path d="M -25 -13 L 25 -13 L 24.5 -7 Q 0 -3.5 -24.5 -7 Z" fill="${CREAM}" stroke="#ddd9cd" stroke-width="0.8"/>`

    // Oversize 连帽卫衣：落肩袖 + 罗纹袖口/下摆 + 袋鼠口袋 + 后帽兜 + 抽绳；左肩稍高
    const cuff = (x, y) => `<g><rect x="${x - 4.5}" y="${y}" width="9" height="5" rx="2" fill="${CHARD}"/>
        <line x1="${x - 2.5}" y1="${y + 0.8}" x2="${x - 2.5}" y2="${y + 4.2}" stroke="${CHARL}" stroke-width="0.7"/>
        <line x1="${x}" y1="${y + 0.8}" x2="${x}" y2="${y + 4.2}" stroke="${CHARL}" stroke-width="0.7"/>
        <line x1="${x + 2.5}" y1="${y + 0.8}" x2="${x + 2.5}" y2="${y + 4.2}" stroke="${CHARL}" stroke-width="0.7"/></g>`
    const hoodie = `
        <path d="M -15 -74 Q -18 -79 -12 -81 Q 0 -84 12 -80 Q 18 -78 15 -73 Q 0 -78 -15 -74 Z" fill="${CHARD}"/>
        <path d="M -24 -72 Q -36 -68 -38 -52 Q -40 -34 -37 -18 Q -36.5 -12 -31 -12.5 Q -26.5 -13 -26 -18 Q -28 -40 -25 -58 Z" fill="url(#gHood)" stroke="${CHARD}" stroke-width="1"/>
        <path d="M 24 -70 Q 36 -66 38 -50 Q 40 -34 37 -18 Q 36.5 -12 31 -12.5 Q 26.5 -13 26 -18 Q 28 -40 25 -56 Z" fill="url(#gHood)" stroke="${CHARD}" stroke-width="1"/>
        <path d="M -24 -72 Q 0 -77 24 -70 Q 29 -44 27 -13 L -27 -13 Q -29 -45 -24 -72 Z" fill="url(#gHood)" stroke="${CHARD}" stroke-width="1.1"/>
        <path d="M -13 -72.5 Q 0 -67 13 -71.5 Q 8 -63 0 -63 Q -8 -63 -13 -72.5 Z" fill="${CHARD}"/>
        <path d="M -13 -72.5 Q 0 -67 13 -71.5" fill="none" stroke="${CHARL}" stroke-width="0.8" opacity="0.6"/>
        <line x1="-3.5" y1="-64" x2="-4.5" y2="-44" stroke="${CREAM}" stroke-width="1.2"/>
        <line x1="3.5" y1="-64" x2="4.5" y2="-44" stroke="${CREAM}" stroke-width="1.2"/>
        <rect x="-5.6" y="-45" width="2.2" height="3" rx="0.8" fill="${LAKE}"/><rect x="3.4" y="-45" width="2.2" height="3" rx="0.8" fill="${LAKE}"/>
        <path d="M -12 -30 L 12 -30 L 15 -15 L -15 -15 Z" fill="none" stroke="${CHARD}" stroke-width="1" opacity="0.8"/>
        <path d="M -12 -30 L -15 -15 M 12 -30 L 15 -15" stroke="${CHARL}" stroke-width="0.6" opacity="0.5" fill="none"/>
        <path d="M -24 -72 Q -20 -66 -14 -64 M 24 -70 Q 20 -65 14 -63" stroke="${CHARD}" stroke-width="0.7" fill="none" opacity="0.6"/>
        <path d="M -27 -14.5 L 27 -14.5 L 27 -11 Q 0 -8 -27 -11 Z" fill="${CHARD}"/>
        ${cuff(-33.5, -13)}${cuff(33.5, -13)}
        <ellipse cx="-33.5" cy="-5" rx="3.6" ry="4" fill="${SKIN}"/><ellipse cx="33.5" cy="-5" rx="3.6" ry="4" fill="${SKIN}"/>`

    // —— 头/脸（柔和倒梯形，圆下巴）——
    const face = `<path d="M -15 -104 Q -16.5 -95 -14.5 -89 Q -11 -82 0 -81 Q 11 -82 14.5 -89 Q 16.5 -95 15 -104 Q 12 -114 0 -114.5 Q -12 -114 -15 -104 Z" fill="url(#gSkin)" stroke="${SKLN}" stroke-width="1"/>`
    // 左耳露出：上缘对齐眉(≈-99)、下缘对齐鼻底(≈-86)
    const earL = `<ellipse cx="-15" cy="-92.5" rx="3.4" ry="6.4" fill="${SKIN}" stroke="${SKLN}" stroke-width="0.8"/>
        <path d="M -15.4 -95 Q -13.2 -93 -14 -89.5" stroke="${SKLN}" stroke-width="0.6" fill="none" opacity="0.7"/>`
    // 腮红 + 鼻子(长约占脸长 30%：桥 -95→底 -86) + 微鼻孔
    const faceFeat = `<ellipse cx="-9" cy="-87" rx="3.8" ry="2.1" fill="#ff9db0" opacity="0.32"/>
        <ellipse cx="9" cy="-87" rx="3.8" ry="2.1" fill="#ff9db0" opacity="0.32"/>
        <path d="M -1 -95 Q -1.8 -89 0.2 -86.4" stroke="${SKLN}" stroke-width="0.8" fill="none" opacity="0.65"/>
        <path d="M 0.2 -86.4 q 1.6 1.1 -0.2 2.2" stroke="${SKLN}" stroke-width="0.9" fill="none"/>`
    // 微表情：默认嘴角上扬约 3°，嘴宽≈瞳孔间距
    const mouths = `<g id="mouths" transform="translate(0 -83)">
        <path id="m-normal" d="M -5.4 0 Q 0 2.5 5.4 -1" stroke="#c07a70" stroke-width="1.3" fill="none" stroke-linecap="round"/>
        <path id="m-happy" d="M -5.5 -0.6 Q 0 5 5.5 -0.6 Z" fill="#c8746a" visibility="hidden"/>
        <ellipse id="m-wow" cx="0" cy="1.2" rx="2.4" ry="3" fill="#c8746a" visibility="hidden"/>
        <path id="m-sleepy" d="M -5 0.6 L 5 0.6" stroke="#c07a70" stroke-width="1.3" fill="none" stroke-linecap="round" visibility="hidden"/></g>`

    // —— 深雾棕长发：七三分碎刘海（右遮左露）+ 一条细辫 + 腰下长发（自然微卷）——
    // 后发：收窄的自然微卷长发（腰下），边缘带 S 形起伏，发尾软波浪
    const hairBack = `<path d="M -14 -109 C -24 -104 -27 -84 -25 -60 C -26 -46 -23 -34 -24 -18 C -25 0 -21 16 -17 27
        Q -10 30 -5 27 Q -8 12 -7 -2 Q -3 10 -1 27 Q 6 30 11 27 Q 9 14 11 0 C 13 -16 21 -28 23 -46 C 26 -70 24 -102 14 -109 C 6 -113 -6 -113 -14 -109 Z"
        fill="url(#gHairB)"/>
        <path d="M -20 -50 Q -22 -20 -19 8" stroke="${HRDK}" stroke-width="0.7" fill="none" opacity="0.45"/>
        <path d="M 17 -54 Q 20 -28 15 2" stroke="${HRDK}" stroke-width="0.7" fill="none" opacity="0.45"/>
        <path d="M -16 22 Q -13 26 -9 24 M 2 24 Q 6 27 10 24" stroke="${HRDK}" stroke-width="0.6" fill="none" opacity="0.5"/>`
    // 一条极细辫子（右后侧垂下）
    const braid = `<g><path d="M 21 -36 Q 26 -4 23 26" fill="none" stroke="${HR}" stroke-width="2.6"/>
        <path d="M 20 -30 L 24.5 -25 M 24.5 -19 L 20 -14 M 20 -8 L 24.8 -3 M 24.5 3 L 20.5 8 M 20.8 14 L 24 19" stroke="${HRDK}" stroke-width="0.6" fill="none"/>
        <circle cx="23" cy="27.5" r="1.6" fill="${GPUR}"/></g>`
    // 三七分刘海：分缝在左(x≈-6)，一整片顺滑向右斜扫(7)，左侧一小绺(3)，尾端 2-3 个柔和发尖
    const bangs = `<path d="M -6 -114 C 5 -116 14 -111 15.5 -102
        C 16 -98 14.8 -95.5 13 -94.5 Q 13.6 -102 9 -105.5 Q 10.5 -97 6 -95 Q 7 -103.5 1.5 -106 Q 2 -99 -2.5 -97.5 Q -3.5 -106 -6 -114 Z"
        fill="url(#gHairF)" stroke="${HRDK}" stroke-width="0.6" stroke-linejoin="round"/>
        <path d="M -6 -114 Q -13 -111 -14.8 -103 Q -15.4 -99 -14 -96.5 Q -11.8 -98.5 -11 -103 Q -9.5 -109 -6 -114 Z"
        fill="url(#gHairF)" stroke="${HRDK}" stroke-width="0.6" stroke-linejoin="round"/>

  // ============ 官方吉祥物 Clawd —— clawd-react(MIT) 的结构 + 真·像素网格渲染 ============
  // 结构/配色取自 clawd-react；此处用像素格逐格渲染 + 高光/阴影分层 + 阶梯边角，找回 8-bit 质感
  function buildClaudePet() {
    const C = 9 // 像素格（够大才有颗粒感）
    const COLORS = {
      H: '#D89474', // 高光（顶部/左上）
      B: '#C27C5C', // 身体（clawd-react BODY）
      S: '#AA6849', // 阴影（底部/右侧）
      D: '#8B5A42', // 暗部/底座/腿（clawd-react DARK）
    }
    const px = (c, r, fill) =>
      `<rect x="${(c * C).toFixed(1)}" y="${(r * C).toFixed(1)}" width="${(C + 0.6).toFixed(1)}" height="${(C + 0.6).toFixed(1)}" fill="${fill}"/>`

    // 身体像素图：平顶+阶梯圆角，H 高光顶、S 右下阴影、D 底座，两侧 N=arm-nub
    // 眼睛留空（用可动骨架覆盖）。列 0..15
    const GRID = [
      '...HHHHHHHHHH...',
      '..HBBBBBBBBBBS..',
      '.HBBBBBBBBBBBBS.',
      '.BBBBBBBBBBBBBS.',
      'NBBBBBBBBBBBBBBN',
      'NBBBBBBBBBBBBBBN',
      '.BBBBBBBBBBBBBS.',
      '.SBBBBBBBBBBBSS.',
      '.SSBBBBBBBBBSSS.',
      '.DDDDDDDDDDDDDD.',
    ]
    let cells = ''
    GRID.forEach((row, r) => {
      for (let c = 0; c < row.length; c++) {
        const ch = row[c]
        if (ch === 'N') cells += px(c, r, COLORS.B)
        else if (COLORS[ch]) cells += px(c, r, COLORS[ch])
      }
    })

    // 四条腿（深色像素，x≈clawd-react 的 2/3.8/9/10.8 → 换算到本格宽；可动 id leg0..3）
    const legCols = [2.5, 5, 10, 12.5]
    let legs = ''
    legCols.forEach((c, i) => {
      legs += `<g class="leg" id="leg${i}">` + px(c, 10, COLORS.D) + px(c, 11, COLORS.D) +
        `<rect x="${(c * C).toFixed(1)}" y="${(12 * C).toFixed(1)}" width="${(C + 0.6).toFixed(1)}" height="${(C * 0.5).toFixed(1)}" fill="#6f4632"/></g>`
    })

    // 眼睛：深色方块像素（2 格宽×3 格高），眨眼/追踪骨架
    const eye = (id, cc) =>
      `<g id="${id}" transform="translate(${(cc * C).toFixed(1)} ${(4 * C).toFixed(1)})"><g class="lid">` +
      `<rect x="${-C}" y="${-1.5 * C}" width="${2 * C}" height="${3 * C}" fill="#1a1a1a"/>` +
      `<rect x="${-0.6 * C}" y="${-1.1 * C}" width="${0.8 * C}" height="${0.8 * C}" fill="#3a3a3a"/></g></g>`
    const eyeL = eye('eyeL', 4.5)
    const eyeR = eye('eyeR', 10.5)

    // 表情骨架（淡淡小嘴，像素块）
    const mX = 6.7 * C, mY = 6.2 * C
    const mouths =
      `<g id="mouths" fill="#6f4328">` +
      `<rect id="m-normal" x="${mX}" y="${mY}" width="${1.6 * C}" height="${0.5 * C}"/>` +
      `<g id="m-happy" visibility="hidden"><rect x="${mX - 0.4 * C}" y="${mY - 0.2 * C}" width="${0.6 * C}" height="${0.6 * C}"/><rect x="${mX + 1.4 * C}" y="${mY - 0.2 * C}" width="${0.6 * C}" height="${0.6 * C}"/><rect x="${mX + 0.2 * C}" y="${mY + 0.4 * C}" width="${1.2 * C}" height="${0.5 * C}"/></g>` +
      `<rect id="m-wow" x="${mX + 0.4 * C}" y="${mY - 0.2 * C}" width="${0.9 * C}" height="${1.1 * C}" visibility="hidden"/>` +
      `<rect id="m-sleepy" x="${mX - 0.1 * C}" y="${mY + 0.2 * C}" width="${1.8 * C}" height="${0.4 * C}" visibility="hidden"/>` +
      `</g>`

    // thinking 火花（纯白像素十字）
    const spark = (cx, cy, s) =>
      `<rect x="${cx - s / 2}" y="${cy - s * 1.5}" width="${s}" height="${s * 3}"/><rect x="${cx - s * 1.5}" y="${cy - s / 2}" width="${s * 3}" height="${s}"/>`
    const sparks = `<g id="sparks" fill="#fff">${spark(5 * C, -1.4 * C, 4.5) + spark(10 * C, -2.2 * C, 3.6)}</g>`
    const zzz = `<text id="zzz" x="${15 * C}" y="${1 * C}" font-size="16" fill="#C27C5C" visibility="hidden">z</text>`

    // viewBox：宽16格、含腿13格，留出头顶火花空间，居中
    return `<svg viewBox="-18 -36 180 176" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      ${sparks}${cells}${legs}${eyeL}${eyeR}${mouths}${zzz}
    </svg>`
  }

  // ============ 程序化桌宠生成器：一句话 → 带动画骨架的 SVG（离线/免费/即时）============
  function shade(hex, f) {
    const n = parseInt(hex.slice(1), 16)
    const c = (v) => Math.max(0, Math.min(255, Math.round(f >= 0 ? v + (255 - v) * f : v * (1 + f))))
    return '#' + [c((n >> 16) & 255), c((n >> 8) & 255), c(n & 255)].map((x) => x.toString(16).padStart(2, '0')).join('')
  }
  function starPath(cx, cy, rO, rI, n) {
    let d = ''
    for (let i = 0; i < n * 2; i++) {
      const r = i % 2 ? rI : rO
      const a = -Math.PI / 2 + (i * Math.PI) / n
      d += (i ? 'L' : 'M') + (cx + r * Math.cos(a)).toFixed(1) + ' ' + (cy + r * Math.sin(a)).toFixed(1) + ' '
    }
    return d + 'Z'
  }

    if (has('花', 'flower')) {
      acc += `<g transform="translate(-24 -30)">
        ${[0,1,2,3,4].map(i=>`<circle cx="${(8*Math.cos(i*1.2566)).toFixed(1)}" cy="${(8*Math.sin(i*1.2566)).toFixed(1)}" r="5" fill="#ff8fb0"/>`).join('')}
        <circle r="4" fill="#ffd166"/></g>`
    }
    if (has('星', 'star') && !starBody) {
      acc += `<path d="${starPath(0, 20, 8, 3.4, 5)}" fill="#ffd166" stroke="${dark}" stroke-width="0.8"/>`
    }
    if (has('爱心', '心', 'heart')) {
      acc += `<path d="M 0 26 C -8 16 -16 20 -12 27 C -9 31 0 36 0 36 C 0 36 9 31 12 27 C 16 20 8 16 0 26 Z" fill="#ff6b8a"/>`
    }

    const svg = `<svg viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
      ${defs ? '<defs>' + defs + '</defs>' : ''}
      ${back}${body}${top}${face}${acc}
    </svg>`
    return svg
  }

  // ============ 皮肤系统 ============
  const svg = document.getElementById('petSvg')
  const bubble = document.getElementById('bubble')
  let lids = [], eyeL = null, eyeR = null, zzz = null
  let baseL = [-13, -4], baseR = [13, -4]

  function parseBase(el, fb) {
    const t = el && el.getAttribute('transform')
    const m = t && t.match(/translate\(\s*(-?[\d.]+)[ ,]+(-?[\d.]+)/)
    return m ? [parseFloat(m[1]), parseFloat(m[2])] : fb
  }
  function applySkin(svgText, persist = true) {
    if (/<script|<foreignObject|javascript:|\son\w+=/i.test(svgText)) return false
    const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml')
    const root = doc.documentElement
    if (root.nodeName !== 'svg' || doc.querySelector('parsererror')) return false
    if (!doc.getElementById('eyeL') || !doc.getElementById('mouths')) return false
    svg.setAttribute('viewBox', root.getAttribute('viewBox') || '-100 -100 200 200')
    svg.innerHTML = root.innerHTML
    lids = [...svg.querySelectorAll('.lid')]
    eyeL = svg.querySelector('#eyeL'); eyeR = svg.querySelector('#eyeR'); zzz = svg.querySelector('#zzz')
    baseL = parseBase(eyeL, [-13, -4]); baseR = parseBase(eyeR, [13, -4])
    if (typeof refreshLegs === 'function') refreshLegs()
    if (persist) { try { localStorage.setItem('petSkin', svgText) } catch {} }
    setMood(mood)
    return true
  }

  // —— 视线追踪 ——
  let tx = 0, ty = 0, gx = 0, gy = 0
  if (window.pet) window.pet.onCursor(({ dx, dy }) => {
    tx = Math.max(-1, Math.min(1, dx / 300)); ty = Math.max(-1, Math.min(1, dy / 300))
  })

  // —— 眨眼 / 心情 ——
  let blink = 0, blinkStart = -1e9, nextBlink = 1500
  const MOODS = ['normal', 'happy', 'wow', 'sleepy']
  let mood = 0
  function setMood(i) {
    mood = ((i % MOODS.length) + MOODS.length) % MOODS.length
    const id = MOODS[mood]
    for (const m of MOODS) { const el = svg.querySelector('#m-' + m); if (el) el.setAttribute('visibility', m === id ? 'visible' : 'hidden') }
    if (zzz) zzz.setAttribute('visibility', id === 'sleepy' ? 'visible' : 'hidden')
  }

  // ============ 自主行为系统（走动 / 踢球 / 打盹）============
  const stage = document.getElementById('stage')
  const petWrap = document.getElementById('petWrap')
  const shadowEl = document.getElementById('shadow')
  const ballEl = document.getElementById('ball')
  const HOME_CX = 170          // petWrap 中心在舞台的 x（left70 + 宽100）
  const WALK_MIN = -66, WALK_MAX = 104 // petX 允许范围
  const FLOOR = 250, BALL_R = 15, WALL_L = 16, WALL_R = 324

  let petX = 0, dir = 1, walkPhase = 0, bobY = 0, kickHop = 0
  let state = 'idle', stateUntil = 0, targetX = 0
  let dragging = false
  // 动漫角色模式：站/坐姿势切换（其它皮肤走踢球逻辑）
  let animeMode = true, currentPose = 'stand'
  function setPose(p) { if (!animeMode || p === currentPose) return; currentPose = p; applySkin(buildAnimeGirl(p), false) }
  let legEls = []
  const ball = { x: 200, y: FLOOR, vx: 0, vy: 0, on: false, restT: 0 }
  let kickCd = 0

  function petCenterX() { return HOME_CX + petX }
  function frontX() { return petCenterX() + dir * 40 }

  function refreshLegs() { legEls = [...svg.querySelectorAll('.leg')] }

  function spawnBall() {
    ball.x = Math.min(WALL_R - 20, Math.max(WALL_L + 20, petCenterX() + dir * 70))
    ball.y = FLOOR - 80; ball.vx = 0; ball.vy = 0; ball.on = true; ball.restT = 0
    ballEl.classList.add('on')
  }
  function hideBall() { ball.on = false; ballEl.classList.remove('on') }

  function pickBehavior(now) {
    if (animeMode) {
      // 站着 / 坐着 交替（含发呆看向鼠标）
      if (Math.random() < 0.55) { state = 'idle'; stateUntil = now + 3000 + Math.random() * 3500 }
      else { state = 'sit'; stateUntil = now + 4000 + Math.random() * 4500 }
      return
    }
    const r = Math.random()
    if (r < 0.30) { state = 'idle'; stateUntil = now + 2500 + Math.random() * 3000 }
    else if (r < 0.58) {
      state = 'walk'; targetX = WALK_MIN + Math.random() * (WALK_MAX - WALK_MIN)
      stateUntil = now + 4000 + Math.random() * 4000
    } else if (r < 0.9) {
      state = 'soccer'; if (!ball.on) spawnBall(); stateUntil = now + 9000 + Math.random() * 6000
      if (mood === 3) setMood(0)
    } else {
      state = 'sleep'; setMood(3); stateUntil = now + 5000 + Math.random() * 5000
    }
  }

  function stepBall(dt) {
    if (!ball.on) return
    ball.vy += 0.55 * dt
    ball.x += ball.vx * dt; ball.y += ball.vy * dt
    if (ball.y > FLOOR) { ball.y = FLOOR; ball.vy *= -0.62; ball.vx *= 0.86; if (Math.abs(ball.vy) < 1.2) ball.vy = 0 }
    if (ball.x < WALL_L) { ball.x = WALL_L; ball.vx = Math.abs(ball.vx) * 0.7 }
    if (ball.x > WALL_R) { ball.x = WALL_R; ball.vx = -Math.abs(ball.vx) * 0.7 }
    const rolling = ball.y >= FLOOR - 0.5
    if (rolling) ball.vx *= 0.97
    const still = rolling && Math.abs(ball.vx) < 0.3 && Math.abs(ball.vy) < 0.3
    ball.restT = still ? ball.restT + dt : 0
    const spin = ball.x * 6
    ballEl.style.transform = `translate(${(ball.x - BALL_R).toFixed(1)}px, ${(ball.y - BALL_R).toFixed(1)}px) rotate(${spin.toFixed(0)}deg)`
  }

  function kick(power) {
    if (!ball.on) return
    ball.vx = dir * (4.5 + Math.random() * 3.5) * power
    ball.vy = -(5 + Math.random() * 3) * power
    kickHop = 1
    if (Math.random() < 0.4) burst(frontX(), FLOOR - 10, '⚽')
  }

  function burst(sx, sy, txt) {
    const fx = document.createElement('span')
    fx.className = 'fx'; fx.textContent = txt
    fx.style.left = sx + 'px'; fx.style.top = (sy - 20) + 'px'
    fx.style.color = txt === '⚽' ? '#fff' : (Math.random() < 0.5 ? '#ff6b8a' : '#d97757')
    stage.appendChild(fx); setTimeout(() => fx.remove(), 950)
  }

  let last = performance.now()
  function loop(now) {
    requestAnimationFrame(loop)
    const dt = Math.min(2.5, (now - last) / 16.67); last = now

    // 眨眼
    if (now >= nextBlink) { blinkStart = now; nextBlink = now + 2200 + Math.random() * 3300 }
    const ph = (now - blinkStart) / 130
    blink = ph >= 0 && ph <= 1 ? Math.sin(Math.PI * ph) : 0
    const openY = MOODS[mood] === 'sleepy' ? 0.22 : Math.max(0.06, 1 - blink)
    lids.forEach((l) => { l.style.transform = `scale(1, ${openY})` })

    // 行为状态机（拖拽中暂停，让它乖乖跟手）
    let walking = false
    if (!dragging) {
      if (now > stateUntil) pickBehavior(now)
      if (animeMode) setPose(state === 'sit' ? 'sit' : 'stand')
      if (state === 'walk') {
        const d = targetX - petX
        if (Math.abs(d) > 2) { dir = d > 0 ? 1 : -1; petX += dir * 1.4 * dt; walking = true }
        else stateUntil = Math.min(stateUntil, now + 400)
      } else if (state === 'soccer') {
        if (!ball.on) spawnBall()
        const gap = ball.x - petCenterX()
        dir = gap >= 0 ? 1 : -1
        const want = ball.x - dir * 34
        if (Math.abs(want - petCenterX()) > 3 && Math.abs(gap) > 24) {
          petX += dir * 1.7 * dt; petX = Math.max(WALL_L - HOME_CX + 40, Math.min(WALL_R - HOME_CX - 40, petX)); walking = true
        }
        // 够到球就踢
        if (kickCd > 0) kickCd -= dt
        if (Math.abs(frontX() - ball.x) < 30 && ball.y > FLOOR - 40 && kickCd <= 0) { kick(1); kickCd = 22 + Math.random() * 20 }
      } else if (state === 'sleep') {
        if (mood !== 3) setMood(3)
      }
      petX = Math.max(WALK_MIN, Math.min(WALK_MAX, petX))
    }

    // 球物理（任何状态都在滚，滚停一会儿就收起）
    stepBall(dt)
    if (ball.on && state !== 'soccer' && ball.restT > 90) hideBall()

    // 腿部走路循环
    walkPhase += (walking ? 0.28 : 0.06) * dt
    if (legEls.length) {
      legEls.forEach((leg, i) => {
        const off = walking ? Math.sin(walkPhase + i * (Math.PI / 2)) * 3.5 : 0
        leg.style.transform = `translateY(${off.toFixed(2)}px)`
      })
    }

    // 浮动 & 踢球小跳
    const baseBob = state === 'sleep' ? Math.sin(now / 900) * 2 : Math.sin(now / (walking ? 200 : 1300)) * (walking ? 4 : 6)
    if (kickHop > 0) kickHop = Math.max(0, kickHop - 0.08 * dt)
    bobY = baseBob - kickHop * 10

    // 视线：走动时朝前看，否则跟光标
    const lookX = walking || state === 'soccer' ? dir * 0.7 : gx
    gx += ((walking || state === 'soccer' ? dir * 0.7 : tx) - gx) * 0.1
    gy += (ty - gy) * 0.1
    const ex = gx * 4, ey = gy * 3
    if (eyeL) eyeL.setAttribute('transform', `translate(${baseL[0] + ex} ${baseL[1] + ey})`)
    if (eyeR) eyeR.setAttribute('transform', `translate(${baseR[0] + ex} ${baseR[1] + ey})`)

    // 应用位移 / 朝向
    petWrap.style.transform = `translate(${petX.toFixed(1)}px, ${bobY.toFixed(1)}px)`
    svg.style.transform = `scaleX(${dir}) rotate(${(gx * 4 * dir).toFixed(1)}deg)`
    const sc = 1 - kickHop * 0.15 + Math.sin(now / (walking ? 200 : 1300)) * 0.04
    shadowEl.style.transform = `translateX(${petX.toFixed(1)}px) scaleX(${sc.toFixed(2)})`
    shadowEl.style.opacity = String(0.85 - kickHop * 0.4)

    // 头顶 thinking 火花：只在 idle（发呆/思考）时亮起，否则完全隐藏
    const sparks = svg.querySelector('#sparks')
    if (sparks) sparks.style.opacity = state === 'idle' ? '1' : '0'
  }

  // —— 点击互动 ——
  function interact() {
    if (animeMode) { // 点一下坐下/起立
      const next = currentPose === 'sit' ? 'stand' : 'sit'
      setPose(next); state = next === 'sit' ? 'sit' : 'idle'; stateUntil = performance.now() + 6000
      setMood(1); setTimeout(() => setMood(0), 1500)
      say(next === 'sit' ? '坐下歇会儿~' : '起立！(๑•̀ㅂ•́)و'); return
    }
    if (ball.on && Math.abs(ball.x - petCenterX()) < 90) {
      dir = ball.x >= petCenterX() ? 1 : -1; kick(1.2)
      say('射门！⚽'); return
    }
    if (!ball.on && Math.random() < 0.4) { state = 'soccer'; spawnBall(); stateUntil = performance.now() + 12000; say('一起踢球吧 ⚽'); return }
    setMood(mood + 1)
    burst(petCenterX(), FLOOR - 60, Math.random() < 0.5 ? '♥' : '✦')
    say(mood === 1 ? '嘿嘿 (＾▽＾)' : mood === 2 ? '哇哦！' : mood === 3 ? '休息一下… z Z' : '继续干活！')
  }
  // —— 点击穿透管理：鼠标在角色/按钮/球上→接管鼠标；在透明区→穿透到桌面 ——
  let ptState = null, uiTimer = 0
  function setPT(on) {
    if (on === ptState) return
    ptState = on
    if (window.pet && window.pet.setPassthrough) window.pet.setPassthrough(on)
  }
  // 只有指到画出来的图形（SVG 形状/球/按钮/输入栏）才算命中
  function overShape(x, y) {
    const el = document.elementFromPoint(x, y)
    if (!el || !el.closest) return false
    if (el.closest('#ball,.sideBtn,#genBar')) return true
    return !!(el.closest('#petSvg') && el.nodeName.toLowerCase() !== 'svg')
  }
  document.addEventListener('mousemove', (e) => {
    if (dragging) { setPT(false); return }
    const inter = overShape(e.clientX, e.clientY)
    setPT(!inter)
    if (inter) {
      stage.classList.add('ui-on')
      clearTimeout(uiTimer)
      uiTimer = setTimeout(() => { if (!genBar.classList.contains('open')) stage.classList.remove('ui-on') }, 1800)
    }
  })
  setPT(true)

  // —— 拖拽移动窗口：按住桌宠拖=移动窗口，没怎么动就当作点击互动 ——
  let dragLastX = 0, dragLastY = 0, dragDist = 0
  function onDragMove(e) {
    if (!dragging) return
    const dx = e.screenX - dragLastX, dy = e.screenY - dragLastY
    dragDist += Math.abs(dx) + Math.abs(dy)
    dragLastX = e.screenX; dragLastY = e.screenY
    if (window.pet && window.pet.dragMove) window.pet.dragMove({ dx, dy })
  }
  function onDragEnd() {
    if (!dragging) return
    dragging = false
    window.removeEventListener('mousemove', onDragMove)
    window.removeEventListener('mouseup', onDragEnd)
    if (dragDist < 5) interact()          // 几乎没动 → 视作点击
    else stateUntil = performance.now() + 1500 // 拖完歇一下再自己动
  }
  function startDrag(e) {
    dragging = true; dragDist = 0
    dragLastX = e.screenX; dragLastY = e.screenY
    window.addEventListener('mousemove', onDragMove)
    window.addEventListener('mouseup', onDragEnd)
    e.preventDefault()
  }
  // petWrap 不再接管鼠标（避免 200×200 方框区域挡桌面），命中实际图形才起拖
  document.addEventListener('mousedown', (e) => {
    const el = document.elementFromPoint(e.clientX, e.clientY)
    if (el && el.closest && el.closest('#petSvg') && el.nodeName.toLowerCase() !== 'svg') startDrag(e)
  })

  ballEl.addEventListener('click', () => { dir = Math.random() < 0.5 ? 1 : -1; kick(1.3); state = 'soccer'; stateUntil = performance.now() + 12000; say('好球！⚽') })
  document.getElementById('close').addEventListener('click', () => window.pet && window.pet.quit())
  document.getElementById('live2d').addEventListener('click', () => { window.location = 'live2d.html' })
  document.getElementById('reset').addEventListener('click', () => {
    animeMode = true; currentPose = 'stand'
    applySkin(DEFAULT_SKIN); try { localStorage.removeItem('petSkin') } catch {}
    say('<span class="prompt">❯</span> 我回来啦 ✦')
  })

  // —— prompt 生成 ——
  const genBar = document.getElementById('genBar')
  const genInput = document.getElementById('genInput')
  const genGo = document.getElementById('genGo')
  document.getElementById('gen').addEventListener('click', () => {
    genBar.classList.toggle('open')
    if (genBar.classList.contains('open')) genInput.focus()
  })
  function doGenerate() {
    const prompt = genInput.value.trim()
    if (!prompt) return say('先描述一下想要的桌宠嘛~')
    say('🎨 正在拼装「' + prompt + '」…')
    setTimeout(() => {
      try {
        const skin = buildSkin(prompt)
        if (applySkin(skin)) {
          animeMode = false // 生成的自定义皮肤走踢球逻辑，不再站/坐
          say('✦ 变身完成！不喜欢点 ↺ 换回我')
          genBar.classList.remove('open'); genInput.value = ''
        } else { say('这个描述没画好，换个说法试试？') }
      } catch (e) { say('出错了：' + String(e).slice(0, 100)) }
    }, 350)
  }
  genGo.addEventListener('click', doGenerate)
  genInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doGenerate() })

  // —— 终端风气泡 ——
  const LINES = [
    '<span class="prompt">❯</span> 正在思考…',
    '<span class="prompt">❯</span> npm run dev <span style="color:#63d471">✓</span>',
    '<span class="prompt">❯</span> 修好了一个 bug',
    '<span class="prompt">❯</span> git push origin main',
    '<span class="prompt">❯</span> 编译通过 · 0 errors',
    'vibe coding 中…', '有新需求吗？', '记得喝水休息哦 ☕', '今天也要加油呀 ✦',
    '点 ✎ 可以让我变身哦', '试试「戴皇冠的紫色小猫」',
  ]
  let bubbleTimer = 0
  function say(html) {
    bubble.innerHTML = html; bubble.classList.add('show')
    clearTimeout(bubbleTimer); bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 4200)
  }
  function chatter() { say(LINES[Math.floor(Math.random() * LINES.length)]); setTimeout(chatter, 18000 + Math.random() * 17000) }

  // —— 启动 ——
  let saved = null
  try { saved = localStorage.getItem('petSkin') } catch {}
  if (saved && applySkin(saved, false)) { animeMode = false }
  else { applySkin(DEFAULT_SKIN, false); animeMode = true; currentPose = 'stand' }
  requestAnimationFrame(loop)
  setTimeout(() => say('<span class="prompt">❯</span> 你好，我是小 Claude ✦'), 1200)
  setTimeout(chatter, 12000)
</script>
</body>
</html>
