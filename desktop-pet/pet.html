<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>Claude Code 桌宠</title>
<style>
  html, body { margin: 0; background: transparent; overflow: hidden; user-select: none; }
  #stage {
    position: relative;
    width: 230px;
    height: 300px;
    -webkit-app-region: drag;
  }
  #petWrap {
    position: absolute;
    left: 15px;
    top: 64px;
    width: 200px;
    height: 200px;
    animation: bob 3.2s ease-in-out infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-7px); }
  }
  #petSvg { width: 100%; height: 100%; transition: transform .15s linear; overflow: visible; }
  #shadow {
    position: absolute;
    left: 55px;
    bottom: 36px;
    width: 120px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(0,0,0,.32), transparent 70%);
    animation: shadowPulse 3.2s ease-in-out infinite;
  }
  @keyframes shadowPulse {
    0%, 100% { transform: scaleX(1); opacity: .9; }
    50% { transform: scaleX(.86); opacity: .6; }
  }
  #faceHit {
    position: absolute;
    left: 75px;
    top: 124px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    -webkit-app-region: no-drag;
    cursor: pointer;
  }
  .sideBtn {
    position: absolute;
    right: 2px;
    width: 22px;
    height: 22px;
    border: none;
    border-radius: 50%;
    background: rgba(30, 30, 36, .85);
    color: #ddd;
    font-size: 11px;
    line-height: 22px;
    text-align: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity .2s;
    -webkit-app-region: no-drag;
    padding: 0;
  }
  #stage:hover .sideBtn { opacity: 1; }
  #close { top: 42px; }
  #gen { top: 70px; }
  #reset { top: 98px; }
  .bubble {
    position: absolute;
    top: 2px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 214px;
    background: #1f2430;
    color: #e8ecf4;
    border: 1px solid #343c4e;
    border-radius: 10px;
    padding: 6px 10px;
    font: 11px/1.5 "SF Mono", Menlo, monospace;
    white-space: normal;
    text-align: center;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
  }
  .bubble::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 50%;
    margin-left: -6px;
    border: 6px solid transparent;
    border-top-color: #1f2430;
    border-bottom: none;
  }
  .bubble.show { opacity: 1; }
  .bubble .prompt { color: #d97757; font-weight: 700; }
  #genBar {
    position: absolute;
    left: 8px;
    right: 8px;
    bottom: 4px;
    display: none;
    gap: 6px;
    -webkit-app-region: no-drag;
  }
  #genBar.open { display: flex; }
  #genInput {
    flex: 1;
    min-width: 0;
    background: #1f2430;
    border: 1px solid #343c4e;
    border-radius: 8px;
    color: #e8ecf4;
    font: 11px/1.4 "PingFang SC", sans-serif;
    padding: 6px 8px;
    outline: none;
  }
  #genInput:focus { border-color: #d97757; }
  #genGo {
    border: none;
    border-radius: 8px;
    background: #d97757;
    color: #fff;
    font-size: 12px;
    padding: 0 10px;
    cursor: pointer;
  }
  #genGo:disabled { opacity: .5; }
  .fx {
    position: absolute;
    font-size: 15px;
    pointer-events: none;
    animation: rise .9s ease-out forwards;
  }
  @keyframes rise {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to { opacity: 0; transform: translateY(-46px) scale(1.5); }
  }
  .lid { transform-box: fill-box; transform-origin: center; }
</style>
</head>
<body>
<div id="stage">
  <div id="bubble" class="bubble"></div>
  <div id="shadow"></div>
  <div id="petWrap">
    <svg id="petSvg" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div id="faceHit" title="点我一下"></div>
  <button id="close" class="sideBtn" title="退出桌宠">✕</button>
  <button id="gen" class="sideBtn" title="用一句话生成新桌宠">✎</button>
  <button id="reset" class="sideBtn" title="换回小 Claude">↺</button>
  <div id="genBar">
    <input id="genInput" placeholder="如：戴帽子的蓝色小猫…回车生成" />
    <button id="genGo">➤</button>
  </div>
</div>
<script>
  // ============ 官方 Claude Code 像素小家伙（还原终端里那只橘色四腿生物）============
  function buildClaudePet() {
    const C = 11 // 像素格大小
    const O = '#c67a4e' // 身体橘
    const OD = '#b06a41' // 暗部
    const OL = '#d68a5e' // 鼻子高光
    const B = 0.6 // 像素块微微外扩，消除相邻块之间的接缝
    const px = (c, r, fill, w = 1, h = 1) =>
      `<rect x="${(c * C - B).toFixed(1)}" y="${(r * C - B).toFixed(1)}" width="${(w * C + B * 2).toFixed(1)}" height="${(h * C + B * 2).toFixed(1)}" fill="${fill}"/>`
    // 身体像素图（o=身体, k=暗部, n=鼻子高光, .=空）
    const GRID = [
      '...oooooo..',
      '..oooooooo.',
      '.oooooooooo',
      '.ooooooooon',
      '.ooooooooon',
      '.ooooooookk',
      '.oooooooo..',
    ]
    let cells = ''
    GRID.forEach((row, r) => {
      for (let c = 0; c < row.length; c++) {
        const ch = row[c]
        if (ch === 'o') cells += px(c, r, O)
        else if (ch === 'k') cells += px(c, r, OD)
        else if (ch === 'n') cells += px(c, r, OL)
      }
    })
    // 四条腿
    const legRows = 7
    ;[2, 4, 6, 8].forEach((c) => {
      cells += px(c, legRows, O)
      cells += px(c, legRows + 1, OD)
    })
    // 头顶火花（像素十字，白色）
    const spark = (cx, cy, s) =>
      `<g fill="#fff"><rect x="${cx - s / 2}" y="${cy - s * 1.5}" width="${s}" height="${s * 3}"/>` +
      `<rect x="${cx - s * 1.5}" y="${cy - s / 2}" width="${s * 3}" height="${s}"/></g>`
    const sparks = spark(3.2 * C, -1.3 * C, 4) + spark(6.4 * C, -2.0 * C, 3.2)

    // 眼睛（白色像素块，作为可眨眼/追踪的骨架）
    const eye = (id, cx, cy) =>
      `<g id="${id}" transform="translate(${cx.toFixed(1)} ${cy.toFixed(1)})"><g class="lid">` +
      `<rect x="${-C * 0.45}" y="${-C * 0.75}" width="${C * 0.9}" height="${C * 1.5}" fill="#fff"/>` +
      `<rect x="${-C * 0.1}" y="${-C * 0.1}" width="${C * 0.32}" height="${C * 0.4}" fill="#5a3a28"/>` +
      `</g></g>`
    const eyeL = eye('eyeL', 3.0 * C, 2.0 * C)
    const eyeR = eye('eyeR', 5.2 * C, 2.0 * C)

    // 表情骨架（像素小嘴，藏在眼下方；点击换心情用）
    const mY = 3.9 * C
    const mX = 4.1 * C
    const mouths =
      `<g id="mouths" fill="#7a4a30">` +
      `<rect id="m-normal" x="${mX}" y="${mY}" width="${C * 0.9}" height="${C * 0.4}"/>` +
      `<g id="m-happy" visibility="hidden"><rect x="${mX - C * 0.3}" y="${mY}" width="${C * 0.5}" height="${C * 0.4}"/><rect x="${mX + C * 0.5}" y="${mY}" width="${C * 0.5}" height="${C * 0.4}"/><rect x="${mX + C * 0.1}" y="${mY + C * 0.35}" width="${C * 0.5}" height="${C * 0.4}"/></g>` +
      `<rect id="m-wow" x="${mX + C * 0.2}" y="${mY - C * 0.1}" width="${C * 0.6}" height="${C * 0.7}" visibility="hidden"/>` +
      `<rect id="m-sleepy" x="${mX - C * 0.1}" y="${mY + C * 0.2}" width="${C * 1.2}" height="${C * 0.3}" visibility="hidden"/>` +
      `</g>`

    const zzz = `<text id="zzz" x="${8 * C}" y="${-0.5 * C}" font-size="16" fill="#c67a4e" visibility="hidden">z</text>`

    // 居中：网格宽约 11 格、含腿高约 9 格，平移到 viewBox 中心
    const ox = -5.5 * C
    const oy = -4.2 * C
    return `<svg viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
      <g transform="translate(${ox.toFixed(1)} ${oy.toFixed(1)})">
        ${sparks}${cells}${eyeL}${eyeR}${mouths}${zzz}
      </g>
    </svg>`
  }
  const DEFAULT_SKIN = buildClaudePet()

  // ============ 程序化桌宠生成器：一句话 → 带动画骨架的 SVG（离线/免费/即时）============
  function shade(hex, f) {
    const n = parseInt(hex.slice(1), 16)
    const c = (v) => Math.max(0, Math.min(255, Math.round(f >= 0 ? v + (255 - v) * f : v * (1 + f))))
    return '#' + [c((n >> 16) & 255), c((n >> 8) & 255), c(n & 255)].map((x) => x.toString(16).padStart(2, '0')).join('')
  }
  function starPath(cx, cy, rO, rI, n) {
    let d = ''
    for (let i = 0; i < n * 2; i++) {
      const r = i % 2 ? rI : rO
      const a = -Math.PI / 2 + (i * Math.PI) / n
      d += (i ? 'L' : 'M') + (cx + r * Math.cos(a)).toFixed(1) + ' ' + (cy + r * Math.sin(a)).toFixed(1) + ' '
    }
    return d + 'Z'
  }

  const PALS = [
    [['橙', '橘', 'orange'], '#d97757'],
    [['红', '赤', 'red'], '#e0574f'],
    [['粉', '桃', 'pink', 'rose'], '#eb8fb4'],
    [['黄', '金', 'yellow', 'gold'], '#f0c250'],
    [['绿', '青绿', 'green'], '#5cb96a'],
    [['蓝', 'blue'], '#5a8fe0'],
    [['青', '蓝绿', 'teal', 'cyan'], '#3fbcbf'],
    [['紫', 'purple', 'violet'], '#9b7ce0'],
    [['棕', '咖啡', 'brown'], '#a9744f'],
    [['黑', 'black'], '#4a4a57'],
    [['白', 'white'], '#e2e6f0'],
    [['灰', 'gray', 'grey'], '#9aa0ad'],
  ]

  function buildSkin(prompt) {
    const p = (prompt || '').toLowerCase()
    const has = (...ks) => ks.some((k) => p.includes(k))

    // —— 主色 ——
    let base = '#d97757'
    const rainbow = has('彩虹', 'rainbow', '七彩')
    for (const [keys, hex] of PALS) if (keys.some((k) => p.includes(k))) { base = hex; break }
    const dark = shade(base, -0.35)
    const light = shade(base, 0.4)
    const pink = '#ff9db0'

    let defs = ''
    let bodyFill = base
    if (rainbow) {
      defs += `<linearGradient id="rb" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ff6b6b"/><stop offset="30%" stop-color="#ffd166"/>
        <stop offset="60%" stop-color="#63d471"/><stop offset="100%" stop-color="#5a8fe0"/></linearGradient>`
      bodyFill = 'url(#rb)'
    }

    // —— 种类判定（优先级从上到下）——
    const KINDS = ['panda','cat','fox','rabbit','bear','dog','mouse','penguin','frog','chick','ghost','robot','dino','slime']
    let kind = 'blob'
    if (has('熊猫', 'panda')) kind = 'panda'
    else if (has('猫', 'cat', 'kitty', '喵')) kind = 'cat'
    else if (has('狐', 'fox')) kind = 'fox'
    else if (has('兔', 'bunny', 'rabbit')) kind = 'rabbit'
    else if (has('熊', 'bear')) kind = 'bear'
    else if (has('狗', '犬', 'dog', 'puppy', '汪')) kind = 'dog'
    else if (has('鼠', 'mouse')) kind = 'mouse'
    else if (has('企鹅', 'penguin')) kind = 'penguin'
    else if (has('蛙', 'frog')) kind = 'frog'
    else if (has('鸡', '鸟', '鸭', 'chick', 'bird', 'duck')) kind = 'chick'
    else if (has('幽灵', '鬼', 'ghost', '灵')) kind = 'ghost'
    else if (has('机器人', 'robot', '机械')) kind = 'robot'
    else if (has('龙', '恐龙', 'dragon', 'dino')) kind = 'dino'
    else if (has('史莱姆', 'slime', '黏', '粘')) kind = 'slime'
    const starBody = (has('星', 'star') && kind === 'blob')

    // —— body / back(耳朵、尾巴等，画在身体后) / top(画在身体上、脸下) ——
    let back = '', body = '', top = ''

    if (kind === 'ghost') {
      body = `<path d="M -34 -2 C -34 -34 34 -34 34 -2 L 34 30 Q 27 22 20 30 Q 13 38 6 30 Q 0 23 -6 30 Q -13 38 -20 30 Q -27 22 -34 30 Z"
        fill="${bodyFill}" fill-opacity="0.92" stroke="${dark}" stroke-width="1.5"/>`
    } else if (kind === 'penguin') {
      body = `<ellipse cx="0" cy="4" rx="34" ry="38" fill="${bodyFill}" stroke="${dark}" stroke-width="1.5"/>`
      top += `<ellipse cx="0" cy="12" rx="21" ry="26" fill="${shade(base, 0.55)}"/>
        <path d="M -6 22 L 0 30 L 6 22 Z" fill="#f0a92e"/>`
    } else if (kind === 'robot') {
      body = `<line x1="0" y1="-34" x2="0" y2="-46" stroke="${dark}" stroke-width="2"/><circle cx="0" cy="-48" r="4" fill="${light}"/>
        <rect x="-34" y="-30" width="68" height="68" rx="16" fill="${bodyFill}" stroke="${dark}" stroke-width="1.5"/>
        <rect x="-40" y="-6" width="8" height="20" rx="4" fill="${dark}"/><rect x="32" y="-6" width="8" height="20" rx="4" fill="${dark}"/>`
    } else if (starBody) {
      body = `<path d="${starPath(0, 4, 44, 20, 5)}" fill="${bodyFill}" stroke="${dark}" stroke-width="1.5" stroke-linejoin="round"/>`
    } else if (kind === 'slime') {
      body = `<path d="M -36 30 C -40 -6 -22 -30 0 -30 C 22 -30 40 -6 36 30 Z" fill="${bodyFill}" fill-opacity="0.9" stroke="${dark}" stroke-width="1.5"/>
        <ellipse cx="-14" cy="-14" rx="7" ry="4" fill="#fff" opacity="0.5"/>`
    } else {
      // 圆身体（猫/狗/熊/兔/狐/鼠/熊猫/蛙/鸡/龙/blob 通用）
      body = `<circle cx="0" cy="4" r="36" fill="${bodyFill}" stroke="${dark}" stroke-width="1.5"/>`
    }

    // 耳朵 / 头部特征
    if (kind === 'cat' || kind === 'fox') {
      const tip = kind === 'fox' ? '#fff' : shade(base, 0.15)
      top += `<path d="M -30 -18 L -37 -46 L -12 -26 Z" fill="${base}" stroke="${dark}" stroke-width="1.5"/>
        <path d="M -28 -22 L -32 -38 L -18 -26 Z" fill="${pink}"/>
        <path d="M 30 -18 L 37 -46 L 12 -26 Z" fill="${base}" stroke="${dark}" stroke-width="1.5"/>
        <path d="M 28 -22 L 32 -38 L 18 -26 Z" fill="${pink}"/>`
      if (kind === 'fox') top += `<path d="M -30 -18 L -35 -34 L -22 -25 Z" fill="${tip}" opacity="0.9"/>
        <path d="M 30 -18 L 35 -34 L 22 -25 Z" fill="${tip}" opacity="0.9"/>`
    } else if (kind === 'bear' || kind === 'panda' || kind === 'mouse') {
      const er = kind === 'mouse' ? 15 : 12
      const ec = kind === 'panda' ? '#3a3a44' : base
      top += `<circle cx="-26" cy="-28" r="${er}" fill="${ec}" stroke="${dark}" stroke-width="1.5"/>
        <circle cx="26" cy="-28" r="${er}" fill="${ec}" stroke="${dark}" stroke-width="1.5"/>
        <circle cx="-26" cy="-28" r="${er - 5}" fill="${pink}" opacity="0.6"/>
        <circle cx="26" cy="-28" r="${er - 5}" fill="${pink}" opacity="0.6"/>`
      if (kind === 'panda') top += `<ellipse cx="-13" cy="-1" rx="10" ry="12" fill="#3a3a44"/>
        <ellipse cx="13" cy="-1" rx="10" ry="12" fill="#3a3a44"/>`
    } else if (kind === 'rabbit') {
      top += `<ellipse cx="-15" cy="-42" rx="8" ry="24" fill="${base}" stroke="${dark}" stroke-width="1.5" transform="rotate(-10 -15 -42)"/>
        <ellipse cx="15" cy="-42" rx="8" ry="24" fill="${base}" stroke="${dark}" stroke-width="1.5" transform="rotate(10 15 -42)"/>
        <ellipse cx="-15" cy="-44" rx="4" ry="16" fill="${pink}" transform="rotate(-10 -15 -44)"/>
        <ellipse cx="15" cy="-44" rx="4" ry="16" fill="${pink}" transform="rotate(10 15 -44)"/>`
    } else if (kind === 'dog') {
      top += `<ellipse cx="-32" cy="-14" rx="11" ry="20" fill="${dark}" transform="rotate(18 -32 -14)"/>
        <ellipse cx="32" cy="-14" rx="11" ry="20" fill="${dark}" transform="rotate(-18 32 -14)"/>`
    } else if (kind === 'chick') {
      top += `<path d="M -6 20 L 0 28 L 6 20 Z" fill="#f0a92e"/>
        <path d="M -3 -34 Q 0 -46 4 -34 Z" fill="${shade(base, -0.15)}"/>`
    } else if (kind === 'frog') {
      top += `<circle cx="-16" cy="-30" r="12" fill="${base}" stroke="${dark}" stroke-width="1.5"/>
        <circle cx="16" cy="-30" r="12" fill="${base}" stroke="${dark}" stroke-width="1.5"/>
        <circle cx="-16" cy="-30" r="6" fill="#fff"/><circle cx="16" cy="-30" r="6" fill="#fff"/>
        <circle cx="-16" cy="-30" r="3" fill="#2e2a33"/><circle cx="16" cy="-30" r="3" fill="#2e2a33"/>`
    } else if (kind === 'dino') {
      top += `<path d="M -30 -22 L -24 -34 L -16 -24 L -8 -36 L 0 -24 L 8 -36 L 16 -24 L 24 -34 L 30 -22 Z" fill="${shade(base, -0.2)}"/>`
    }

    // —— 脸（动画骨架，所有皮肤共用）——
    const sleepy = base
    const face = `<g id="face" transform="translate(0 4)">
      <ellipse cx="-19" cy="10" rx="7.5" ry="4" fill="${pink}" opacity="0.6"/>
      <ellipse cx="19" cy="10" rx="7.5" ry="4" fill="${pink}" opacity="0.6"/>
      <g id="eyeL" transform="translate(-13 -3)"><g class="lid">
        <ellipse rx="7" ry="9.5" fill="#fff" stroke="${dark}" stroke-width="0.8"/>
        <circle cx="0" cy="0.5" r="4.6" fill="#2e2a33"/>
        <circle cx="-1.7" cy="-2.2" r="1.9" fill="#fff"/>
        <circle cx="1.5" cy="2.4" r="0.9" fill="#fff" opacity="0.8"/>
      </g></g>
      <g id="eyeR" transform="translate(13 -3)"><g class="lid">
        <ellipse rx="7" ry="9.5" fill="#fff" stroke="${dark}" stroke-width="0.8"/>
        <circle cx="0" cy="0.5" r="4.6" fill="#2e2a33"/>
        <circle cx="-1.7" cy="-2.2" r="1.9" fill="#fff"/>
        <circle cx="1.5" cy="2.4" r="0.9" fill="#fff" opacity="0.8"/>
      </g></g>
      <g id="mouths">
        <path id="m-normal" d="M -5 10 Q 0 14 5 10" stroke="#2e2a33" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path id="m-happy" d="M -7 9 Q 0 18 7 9 Z" fill="#2e2a33" visibility="hidden"/>
        <ellipse id="m-wow" cx="0" cy="12" rx="4" ry="5" fill="#2e2a33" visibility="hidden"/>
        <path id="m-sleepy" d="M -5 12 L 5 12" stroke="#2e2a33" stroke-width="2" fill="none" stroke-linecap="round" visibility="hidden"/>
      </g>
      <text id="zzz" x="30" y="-20" font-size="13" fill="${dark}" visibility="hidden">z Z</text>
    </g>`

    // —— 配饰（画在最上层）——
    let acc = ''
    if (has('眼镜', 'glasses', '墨镜', 'sunglasses')) {
      const gf = has('墨镜', 'sunglasses') ? '#2e2a33' : 'rgba(150,190,255,0.18)'
      acc += `<g transform="translate(0 1)">
        <circle cx="-13" cy="0" r="10" fill="${gf}" stroke="#2e2a33" stroke-width="2"/>
        <circle cx="13" cy="0" r="10" fill="${gf}" stroke="#2e2a33" stroke-width="2"/>
        <path d="M -3 0 Q 0 -3 3 0" stroke="#2e2a33" stroke-width="2" fill="none"/></g>`
    }
    if (has('皇冠', '王冠', 'crown')) {
      acc += `<path d="M -20 -32 L -20 -50 L -10 -40 L 0 -54 L 10 -40 L 20 -50 L 20 -32 Z"
        fill="#f5c542" stroke="#c99a1e" stroke-width="1.5"/>
        <circle cx="0" cy="-46" r="2.5" fill="#e0574f"/>`
    } else if (has('帽子', '礼帽', 'hat', 'cap')) {
      acc += `<path d="M -26 -30 Q 0 -34 26 -30 L 22 -32 Z" fill="#3a4a8f"/>
        <rect x="-16" y="-52" width="32" height="24" rx="4" fill="#3a4a8f" stroke="#28356b" stroke-width="1.5"/>
        <rect x="-18" y="-32" width="36" height="6" rx="3" fill="#28356b"/>`
    }
    if (has('蝴蝶结', 'bow', '领结')) {
      acc += `<g transform="translate(22 -26)">
        <path d="M 0 0 L -13 -7 L -13 8 Z" fill="#e0574f"/><path d="M 0 0 L 13 -7 L 13 8 Z" fill="#e0574f"/>
        <circle r="3.5" fill="#b5423b"/></g>`
    }
    if (has('围巾', 'scarf', '领巾')) {
      acc += `<path d="M -22 30 Q 0 40 22 30 L 20 38 Q 0 46 -20 38 Z" fill="#e0574f" stroke="#b5423b" stroke-width="1"/>
        <path d="M 12 36 L 18 52 L 8 50 Z" fill="#c9463e"/>`
    }
    if (has('耳机', 'headphone', 'headset')) {
      acc += `<path d="M -34 -2 A 34 34 0 0 1 34 -2" fill="none" stroke="#2e2a33" stroke-width="4"/>
        <rect x="-42" y="-4" width="12" height="20" rx="5" fill="#2e2a33"/><rect x="30" y="-4" width="12" height="20" rx="5" fill="#2e2a33"/>`
    }
    if (has('花', 'flower')) {
      acc += `<g transform="translate(-24 -30)">
        ${[0,1,2,3,4].map(i=>`<circle cx="${(8*Math.cos(i*1.2566)).toFixed(1)}" cy="${(8*Math.sin(i*1.2566)).toFixed(1)}" r="5" fill="#ff8fb0"/>`).join('')}
        <circle r="4" fill="#ffd166"/></g>`
    }
    if (has('星', 'star') && !starBody) {
      acc += `<path d="${starPath(0, 20, 8, 3.4, 5)}" fill="#ffd166" stroke="${dark}" stroke-width="0.8"/>`
    }
    if (has('爱心', '心', 'heart')) {
      acc += `<path d="M 0 26 C -8 16 -16 20 -12 27 C -9 31 0 36 0 36 C 0 36 9 31 12 27 C 16 20 8 16 0 26 Z" fill="#ff6b8a"/>`
    }

    const svg = `<svg viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg">
      ${defs ? '<defs>' + defs + '</defs>' : ''}
      ${back}${body}${top}${face}${acc}
    </svg>`
    return svg
  }

  // ============ 皮肤系统 ============
  const svg = document.getElementById('petSvg')
  const bubble = document.getElementById('bubble')
  let lids = [], eyeL = null, eyeR = null, zzz = null
  let baseL = [-13, -4], baseR = [13, -4]

  function parseBase(el, fb) {
    const t = el && el.getAttribute('transform')
    const m = t && t.match(/translate\(\s*(-?[\d.]+)[ ,]+(-?[\d.]+)/)
    return m ? [parseFloat(m[1]), parseFloat(m[2])] : fb
  }
  function applySkin(svgText, persist = true) {
    if (/<script|<foreignObject|javascript:|\son\w+=/i.test(svgText)) return false
    const doc = new DOMParser().parseFromString(svgText, 'image/svg+xml')
    const root = doc.documentElement
    if (root.nodeName !== 'svg' || doc.querySelector('parsererror')) return false
    if (!doc.getElementById('eyeL') || !doc.getElementById('mouths')) return false
    svg.setAttribute('viewBox', root.getAttribute('viewBox') || '-100 -100 200 200')
    svg.innerHTML = root.innerHTML
    lids = [...svg.querySelectorAll('.lid')]
    eyeL = svg.querySelector('#eyeL'); eyeR = svg.querySelector('#eyeR'); zzz = svg.querySelector('#zzz')
    baseL = parseBase(eyeL, [-13, -4]); baseR = parseBase(eyeR, [13, -4])
    if (persist) { try { localStorage.setItem('petSkin', svgText) } catch {} }
    setMood(mood)
    return true
  }

  // —— 视线追踪 ——
  let tx = 0, ty = 0, gx = 0, gy = 0
  if (window.pet) window.pet.onCursor(({ dx, dy }) => {
    tx = Math.max(-1, Math.min(1, dx / 300)); ty = Math.max(-1, Math.min(1, dy / 300))
  })

  // —— 眨眼 / 心情 ——
  let blink = 0, blinkStart = -1e9, nextBlink = 1500
  const MOODS = ['normal', 'happy', 'wow', 'sleepy']
  let mood = 0
  function setMood(i) {
    mood = ((i % MOODS.length) + MOODS.length) % MOODS.length
    const id = MOODS[mood]
    for (const m of MOODS) { const el = svg.querySelector('#m-' + m); if (el) el.setAttribute('visibility', m === id ? 'visible' : 'hidden') }
    if (zzz) zzz.setAttribute('visibility', id === 'sleepy' ? 'visible' : 'hidden')
  }
  function loop(now) {
    requestAnimationFrame(loop)
    gx += (tx - gx) * 0.12; gy += (ty - gy) * 0.12
    if (now >= nextBlink) { blinkStart = now; nextBlink = now + 2200 + Math.random() * 3300 }
    const ph = (now - blinkStart) / 130
    blink = ph >= 0 && ph <= 1 ? Math.sin(Math.PI * ph) : 0
    const openY = MOODS[mood] === 'sleepy' ? 0.22 : Math.max(0.06, 1 - blink)
    lids.forEach((l) => { l.style.transform = `scale(1, ${openY})` })
    const ex = gx * 4, ey = gy * 3
    if (eyeL) eyeL.setAttribute('transform', `translate(${baseL[0] + ex} ${baseL[1] + ey})`)
    if (eyeR) eyeR.setAttribute('transform', `translate(${baseR[0] + ex} ${baseR[1] + ey})`)
    svg.style.transform = `rotate(${gx * 5}deg)`
  }

  // —— 点击互动 ——
  document.getElementById('faceHit').addEventListener('click', () => {
    setMood(mood + 1)
    const fx = document.createElement('span')
    fx.className = 'fx'
    fx.textContent = Math.random() < 0.5 ? '♥' : '✦'
    fx.style.left = 95 + (Math.random() * 40 - 20) + 'px'
    fx.style.top = '112px'
    fx.style.color = Math.random() < 0.5 ? '#ff6b8a' : '#d97757'
    document.getElementById('stage').appendChild(fx)
    setTimeout(() => fx.remove(), 950)
    say(mood === 1 ? '嘿嘿 (＾▽＾)' : mood === 2 ? '哇哦！' : mood === 3 ? '休息一下… z Z' : '继续干活！')
  })
  document.getElementById('close').addEventListener('click', () => window.pet && window.pet.quit())
  document.getElementById('reset').addEventListener('click', () => {
    applySkin(DEFAULT_SKIN); try { localStorage.removeItem('petSkin') } catch {}
    say('<span class="prompt">❯</span> 我回来啦 ✦')
  })

  // —— prompt 生成 ——
  const genBar = document.getElementById('genBar')
  const genInput = document.getElementById('genInput')
  const genGo = document.getElementById('genGo')
  document.getElementById('gen').addEventListener('click', () => {
    genBar.classList.toggle('open')
    if (genBar.classList.contains('open')) genInput.focus()
  })
  function doGenerate() {
    const prompt = genInput.value.trim()
    if (!prompt) return say('先描述一下想要的桌宠嘛~')
    say('🎨 正在拼装「' + prompt + '」…')
    setTimeout(() => {
      try {
        const skin = buildSkin(prompt)
        if (applySkin(skin)) {
          say('✦ 变身完成！不喜欢点 ↺ 换回我')
          genBar.classList.remove('open'); genInput.value = ''
        } else { say('这个描述没画好，换个说法试试？') }
      } catch (e) { say('出错了：' + String(e).slice(0, 100)) }
    }, 350)
  }
  genGo.addEventListener('click', doGenerate)
  genInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doGenerate() })

  // —— 终端风气泡 ——
  const LINES = [
    '<span class="prompt">❯</span> 正在思考…',
    '<span class="prompt">❯</span> npm run dev <span style="color:#63d471">✓</span>',
    '<span class="prompt">❯</span> 修好了一个 bug',
    '<span class="prompt">❯</span> git push origin main',
    '<span class="prompt">❯</span> 编译通过 · 0 errors',
    'vibe coding 中…', '有新需求吗？', '记得喝水休息哦 ☕', '今天也要加油呀 ✦',
    '点 ✎ 可以让我变身哦', '试试「戴皇冠的紫色小猫」',
  ]
  let bubbleTimer = 0
  function say(html) {
    bubble.innerHTML = html; bubble.classList.add('show')
    clearTimeout(bubbleTimer); bubbleTimer = setTimeout(() => bubble.classList.remove('show'), 4200)
  }
  function chatter() { say(LINES[Math.floor(Math.random() * LINES.length)]); setTimeout(chatter, 18000 + Math.random() * 17000) }

  // —— 启动 ——
  let saved = null
  try { saved = localStorage.getItem('petSkin') } catch {}
  if (!saved || !applySkin(saved, false)) applySkin(DEFAULT_SKIN, false)
  requestAnimationFrame(loop)
  setTimeout(() => say('<span class="prompt">❯</span> 你好，我是小 Claude ✦'), 1200)
  setTimeout(chatter, 12000)
</script>
</body>
</html>
